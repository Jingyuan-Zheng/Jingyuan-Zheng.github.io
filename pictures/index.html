    (function () {
        var configElement = document.getElementById("site-language-config");

        try {
            config = JSON.parse(configElement.textContent || "{}");

        var preference = null;
        try {
            preference = localStorage.getItem("jingyuan-language-preference");

        }

        var primaryLocale = (navigator.languages && navigator.languages[0]) || navigator.language || "en";
        var primaryLanguage = String(primaryLocale).trim().replace(/_/g, "-").split("-")[0].toLowerCase();
        var target = null;

        if ((preference === "en" || preference === "zh") && preference !== config.currentLanguage) {
            target = preference === "zh" ? config.chineseTarget : config.englishTarget;
        } else if (!preference && config.currentLanguage === "en" && primaryLanguage === "zh") {
            target = config.chineseTarget;
        }

        if (!target) return;

        var targetURL = new URL(target, window.location.origin);
        targetURL.search = window.location.search;
        targetURL.hash = window.location.hash;

        if (targetURL.href !== window.location.href) window.location.replace(targetURL.href);
    })();
</script>
